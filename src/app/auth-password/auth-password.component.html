<div class="auth-container">
  <div class="auth-card">
    <div class="method-badge">🔑 Lösenord</div>
    <p class="step-label">{{ stepLabel }}</p>

    @if (step === 'form') {
      <h2>Logga in med lösenord</h2>
      <p class="hint">Ange valfritt användarnamn och lösenord för att simulera inloggning.</p>
      <form (ngSubmit)="login()">
        <div class="field">
          <label for="username">Användarnamn</label>
          <input id="username" type="text" [(ngModel)]="username" name="username" placeholder="t.ex. anna@exempel.se" autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">Lösenord</label>
          <div class="input-row">
            <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Valfritt lösenord" autocomplete="current-password" />
            <button type="button" class="toggle-btn" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Dölj lösenord' : 'Visa lösenord'">
              {{ showPassword ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>
        <button class="btn btn-primary" type="submit" [disabled]="!username || !password">Logga in</button>
      </form>
    }

    @if (step === 'loading') {
      <div class="loading">
        <div class="spinner"></div>
        <p>Verifierar inloggning…</p>
      </div>
    }

    @if (step === 'success') {
      <div class="success">
        <span class="big-icon">✅</span>
        <h2>Inloggning lyckades!</h2>
        <p>Lösenordet accepterades (simulerat).</p>
        <button class="btn btn-primary" (click)="continueTest()">Fortsätt testet</button>
      </div>
    }
  </div>
</div>
